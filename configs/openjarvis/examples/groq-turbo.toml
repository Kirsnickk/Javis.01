# Groq Turbo — Ultra-fast cloud inference via Groq LPU
# Copy to ~/.openjarvis/config.toml
#
# Groq's LPU chip delivers the fastest inference speeds available.
# Best for interactive chat, real-time coding, and latency-sensitive tasks.
#
# Prerequisites:
#   export GROQ_API_KEY="gsk_..."
#
# Usage:
#   jarvis init --preset groq-turbo
#   jarvis ask "Explain quantum computing in simple terms"
#   jarvis chat                  # interactive chat session
#   jarvis serve                 # start API server

[engine]
default = "cloud"

[intelligence]
default_model = "llama-3.3-70b-versatile"     # Best quality on Groq
# default_model = "llama-3.1-8b-instant"      # Fastest response
# default_model = "qwen/qwen3-32b"            # Best for coding
# default_model = "openai/gpt-oss-120b"       # Strongest reasoning
temperature = 0.7
max_tokens = 4096

[agent]
default_agent = "orchestrator"      # Multi-turn with tool selection
max_turns = 8
tools = "code_interpreter,web_search,file_read,calculator,think"

[server]
host = "0.0.0.0"
port = 8000
